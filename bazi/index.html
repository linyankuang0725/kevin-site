<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>八字綜合命理分析 | Kevin Site</title>
    <meta name="description" content="實驗版八字綜合命理網站：輸入姓名、生辰、出生地與 WhatsApp 選填資訊，立即產生中文分析。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero container">
      <span class="eyebrow">Bazi v0 · Experimental</span>
      <h1>八字綜合命理分析</h1>
      <p class="hero-copy">
        這是第一版產品原型：結合八字、紫微、人類圖與星座語感，先產出中文長文式分析。
        後續會升級成真正的排盤與後端解讀引擎。
      </p>
      <div class="hero-pills">
        <span>中文輸出</span>
        <span>手機優先 RWD</span>
        <span>WhatsApp 週報預留</span>
      </div>
    </header>

    <main class="container stack-layout">
      <section class="panel form-panel">
        <div class="section-head">
          <h2>輸入資料</h2>
          <p>目前必填：姓名、出生日期、出生時間、出生地點。手機號碼為選填，用於未來 WhatsApp 週報。</p>
        </div>

        <form id="bazi-form" class="bazi-form">
          <div class="field-grid two-col">
            <label class="field">
              <span>姓名</span>
              <input type="text" id="name" name="name" placeholder="例如：Kevin" required />
            </label>
            <label class="field">
              <span>出生日期</span>
              <input type="date" id="birthDate" name="birthDate" required />
            </label>
            <label class="field">
              <span>出生時間</span>
              <input type="time" id="birthTime" name="birthTime" required />
            </label>
            <label class="field">
              <span>出生地點</span>
              <input type="text" id="birthPlace" name="birthPlace" placeholder="例如：台北，台灣" required />
            </label>
            <label class="field">
              <span>性別（選填）</span>
              <select id="gender" name="gender">
                <option value="">不提供</option>
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="non-binary">非二元</option>
                <option value="other">其他</option>
              </select>
            </label>
            <label class="field">
              <span>WhatsApp 手機號碼（選填）</span>
              <input type="tel" id="phone" name="phone" placeholder="例如：+49 1515 2132467" />
            </label>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" id="whatsappOptIn" name="whatsappOptIn" />
            <span>我希望未來收到 WhatsApp 八字週報。</span>
          </label>

          <button class="primary-btn" type="submit">產生分析</button>
        </form>
      </section>

      <section class="panel result-panel" id="report-root">
        <div class="section-head">
          <h2>分析結果</h2>
          <p>目前這一版先用中文長文形式呈現，下一版會升級成真正的排盤 + 後端解讀。</p>
        </div>

        <div class="report-meta">
          <div><span>檔案</span><strong id="summary-name">模板預覽</strong></div>
          <div><span>本週訊號</span><strong id="summary-score">聚焦成長</strong></div>
          <div><span>WhatsApp</span><strong id="summary-whatsapp">未開啟</strong></div>
        </div>

        <article class="markdown-report" id="markdown-report"></article>
      </section>
    </main>

    <footer class="container footer">
      <p>v0 仍屬產品原型，尚未接入完整命盤計算引擎。</p>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>

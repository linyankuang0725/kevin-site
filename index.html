<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kevin Site</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; display: grid; place-items: center; min-height: 100vh; }
      .card { max-width: 720px; padding: 40px; border-radius: 20px; background: #111827; box-shadow: 0 20px 50px rgba(0,0,0,.35); }
      h1 { margin-top: 0; font-size: 2.5rem; }
      p { line-height: 1.7; color: #cbd5e1; }
      .tag { display: inline-block; margin-top: 16px; padding: 8px 12px; border-radius: 999px; background: #1d4ed8; color: white; font-size: .9rem; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Kevin's site is live 🚀</h1>
      <p>This is the first deployment of your new Cloudflare Pages project.</p>
      <p>You can now replace this page with any HTML, React, Next.js, or static site content you want.</p>
      <div class="tag">Deployed via GitHub + Cloudflare Pages</div>
    </main>
  </body>
</html>
